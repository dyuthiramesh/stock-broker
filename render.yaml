services:
  # ── Backend: Web Service ──────────────────────────────────────
  - type: web
    name: stock-broker-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a random secret on first deploy
      - key: DB_DIR
        value: /data
      - key: CORS_ORIGIN
        sync: false                  # Set to your frontend URL in the Render dashboard
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

  # ── Frontend: Static Site ────────────────────────────────────
  - type: static
    name: stock-broker-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false                  # Set to https://stock-broker-onkn.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html    # SPA fallback — all paths serve index.html
