services:
  # ── Backend: Web Service ──────────────────────────────────────
  - type: web
    name: stock-broker-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render generates a random secret on first deploy
      - key: CORS_ORIGIN
        sync: false                  # Set to your frontend URL in the Render dashboard
    # NOTE: No persistent disk (free tier).
    # SQLite lives on the ephemeral filesystem — data survives sleep/wake cycles
    # but resets on every new deploy. Acceptable for a demo; upgrade to a disk
    # ($0.25/GB/mo) or switch to Turso (free managed SQLite) for true persistence.

  # ── Frontend: Static Site ────────────────────────────────────
  - type: static
    name: stock-broker-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false                  # Set to https://stock-broker-onkn.onrender.com
    # No routes/rewrite needed — this app has no client-side routing.
    # Removing the /* → index.html catch-all fixes CSS/JS assets being
    # served as HTML on Render (rewrites apply before file lookup).
